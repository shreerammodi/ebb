version: 2
updates:
    # Keep the SHA-pinned GitHub Actions current. Dependabot follows the `# vX`
    # comment next to each pin and bumps both the SHA and the comment together.
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
      groups:
          actions:
              patterns:
                  - "*"

    # npm dependencies (includes the `overrides` pins that resolve security
    # advisories, e.g. postcss under next).
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
      groups:
          npm:
              patterns:
                  - "*"
      # TypeScript 7 is the native (Go) rewrite; its npm package drops the
      # classic compiler API from the package root, which Next's build-time
      # typecheck loads. Stay on 6.x until Next supports the new layout.
      ignore:
          - dependency-name: typescript
            update-types: ["version-update:semver-major"]
