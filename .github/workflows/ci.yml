name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    web:
        name: Web (test + lint + build)
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm test
            - run: npm run lint
            - run: npm run build

    desktop:
        name: Desktop shell (cargo check)
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - uses: dtolnay/rust-toolchain@stable
            - uses: swatinem/rust-cache@v2
              with:
                  workspaces: "./src-tauri -> target"
            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf \
                    libssl-dev
            # generate_context! reads frontendDist (../out), so it must exist.
            - run: npm ci
            - run: npm run build
            - run: cargo check --manifest-path src-tauri/Cargo.toml
