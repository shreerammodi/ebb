name: Deploy web build

# Publishes the static web export (the trial on-ramp) to GitHub Pages on every
# push to main. The desktop app is unaffected — it ships via release.yml.
# "Deploying" the web build *is* its update: there is no in-app updater on web,
# a reload is non-destructive (continuous autosave), and the user controls when
# they reload, so no tournament gating applies here.
on:
    push:
        branches: [main]
    # Allow manual redeploys without a new commit.
    workflow_dispatch:

# GITHUB_TOKEN needs pages write + an OIDC token for the deploy step.
permissions:
    contents: read
    pages: write
    id-token: write

# One live deployment at a time; let an in-progress run finish so a published
# site is never left half-swapped.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        name: Build static export
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            # next build → ./out (output: "export").
            - run: npm run build
            # Next emits _next/* assets; without .nojekyll, Pages' Jekyll layer
            # drops files/dirs starting with an underscore.
            - run: touch out/.nojekyll
            - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
              with:
                  path: out

    deploy:
        name: Deploy to GitHub Pages
        needs: build
        runs-on: ubuntu-22.04
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
