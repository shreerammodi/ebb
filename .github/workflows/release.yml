name: Release desktop app

# Builds signed, cross-platform desktop installers and publishes them to a
# GitHub Release, along with the `latest.json` manifest the in-app updater
# reads. Triggered by pushing a version tag (e.g. `v0.2.0`).
on:
    push:
        tags:
            - "v*"

# Allow the workflow to create the release and upload assets.
permissions:
    contents: write

jobs:
    release:
        strategy:
            fail-fast: false
            matrix:
                include:
                    # macOS universal (Apple Silicon + Intel)
                    - platform: macos-latest
                      args: "--target universal-apple-darwin"
                    # Linux x64
                    - platform: ubuntu-22.04
                      args: ""
                    # Windows x64
                    - platform: windows-latest
                      args: ""

        runs-on: ${{ matrix.platform }}
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Node
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 20
                  cache: npm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
              with:
                  # Both Apple targets so the universal/per-arch builds resolve.
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Rust cache
              uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
              with:
                  workspaces: "./src-tauri -> target"

            # Linux build deps for the WebKitGTK webview and the AppImage bundler.
            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf \
                    libssl-dev

            - name: Install npm dependencies
              run: npm ci

            - name: Build, sign, and publish
              uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Ed25519 updater signing — mandatory. Generate with
                  # `npm run tauri signer generate` and store these as repo secrets.
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  # OS code signing (deferred, ships unsigned beta builds). Do NOT wire
                  # the APPLE_* env vars from unset secrets: an unset secret becomes a
                  # defined-but-empty env var, and the bundler treats a *present*
                  # APPLE_CERTIFICATE as "sign me", then fails on `security import` with
                  # empty cert data. To enable Developer ID signing + notarization, add
                  # these env keys back here alongside their (non-empty) repo secrets:
                  #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
                  #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
              with:
                  # tauri-action creates the release, builds per-platform installers,
                  # signs the updater artifacts, generates latest.json, and uploads all
                  # of it. The tag that triggered the run names the release.
                  tagName: ${{ github.ref_name }}
                  releaseName: "Ebb ${{ github.ref_name }}"
                  releaseBody: "See the assets below to download and install, and the [changelog](https://github.com/shreerammodi/ebb/blob/main/CHANGELOG.md) for a log of updates."
                  releaseDraft: true
                  prerelease: false
                  includeUpdaterJson: true
                  args: ${{ matrix.args }}
