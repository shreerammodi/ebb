name: Release desktop app

# Builds signed, cross-platform desktop installers and publishes them to a
# GitHub Release, along with the `latest.json` manifest the in-app updater
# reads. Triggered by pushing a version tag (e.g. `v0.2.0`).
on:
    push:
        tags:
            - "v*"

# Allow the workflow to create the release and upload assets.
permissions:
    contents: write

jobs:
    release:
        strategy:
            fail-fast: false
            matrix:
                include:
                    # macOS arm64 (Apple Silicon)
                    - platform: macos-latest
                      args: "--target aarch64-apple-darwin"
                    # macOS x64 (Intel)
                    - platform: macos-latest
                      args: "--target x86_64-apple-darwin"
                    # Linux x64
                    - platform: ubuntu-22.04
                      args: ""
                    # Windows x64
                    - platform: windows-latest
                      args: ""

        runs-on: ${{ matrix.platform }}
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 20
                  cache: npm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
              with:
                  # Both Apple targets so the universal/per-arch builds resolve.
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Rust cache
              uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
              with:
                  workspaces: "./src-tauri -> target"

            # Linux build deps for the WebKitGTK webview and the AppImage bundler.
            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf \
                    libssl-dev

            - name: Install npm dependencies
              run: npm ci

            - name: Build, sign, and publish
              uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Ed25519 updater signing — mandatory. Generate with
                  # `npm run tauri signer generate` and store these as repo secrets.
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  # ── OS code signing (deferred). Leave these secrets unset to ship
                  # ── unsigned beta builds; populate them later with no other changes.
                  # macOS Developer ID + notarization:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              with:
                  # tauri-action creates the release, builds per-platform installers,
                  # signs the updater artifacts, generates latest.json, and uploads all
                  # of it. The tag that triggered the run names the release.
                  tagName: ${{ github.ref_name }}
                  releaseName: "Ebb ${{ github.ref_name }}"
                  releaseBody: "See the assets below to download and install. First run on an unsigned build needs a manual trust step — see docs/desktop/manual-trust.md."
                  releaseDraft: true
                  prerelease: false
                  includeUpdaterJson: true
                  args: ${{ matrix.args }}

    # Flatpak is not a Tauri bundle target, so it can't ride tauri-action above.
    # This job rebuilds the Linux .deb, wraps it with flatpak-builder, and
    # attaches a single-file .flatpak bundle to the same draft release. Flatpak
    # apps update through their own repo, not the Tauri updater.
    flatpak:
        needs: release
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 20
                  cache: npm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

            - name: Rust cache
              uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
              with:
                  workspaces: "./src-tauri -> target"

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf \
                    libssl-dev \
                    flatpak \
                    flatpak-builder

            - name: Install npm dependencies
              run: npm ci

            - name: Build the Linux .deb
              run: npm run tauri -- build --bundles deb

            - name: Install the GNOME runtime
              run: |
                  flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
                  flatpak install --user -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

            - name: Build the flatpak bundle
              run: |
                  cp src-tauri/target/release/bundle/deb/*.deb flatpak/ebb.deb
                  flatpak-builder --user --force-clean --repo=flatpak/repo \
                    flatpak/build flatpak/net.smodi.ebb.yml
                  flatpak build-bundle flatpak/repo ebb.flatpak net.smodi.ebb

            - name: Attach the bundle to the release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release upload "${{ github.ref_name }}" ebb.flatpak --clobber
