name: Release desktop app

# Builds signed, cross-platform desktop installers and publishes them to a
# GitHub Release, along with the `latest.json` manifest the in-app updater
# reads. Triggered by pushing a version tag (e.g. `v0.2.0`).
on:
    push:
        tags:
            - "v*"

# Allow the workflow to create the release and upload assets.
permissions:
    contents: write

jobs:
    release:
        strategy:
            fail-fast: false
            matrix:
                include:
                    # macOS arm64 (Apple Silicon)
                    - platform: macos-latest
                      args: "--target aarch64-apple-darwin"
                    # macOS x64 (Intel)
                    - platform: macos-latest
                      args: "--target x86_64-apple-darwin"
                    # Linux x64
                    - platform: ubuntu-22.04
                      args: ""
                    # Windows x64
                    - platform: windows-latest
                      args: ""

        runs-on: ${{ matrix.platform }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  # Both Apple targets so the universal/per-arch builds resolve.
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: "./src-tauri -> target"

            # Linux build deps for the WebKitGTK webview and the AppImage bundler.
            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf \
                    libssl-dev

            - name: Install npm dependencies
              run: npm ci

            - name: Build, sign, and publish
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Ed25519 updater signing — mandatory. Generate with
                  # `npm run tauri signer generate` and store these as repo secrets.
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  # ── OS code signing (deferred). Leave these secrets unset to ship
                  # ── unsigned beta builds; populate them later with no other changes.
                  # macOS Developer ID + notarization:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              with:
                  # tauri-action creates the release, builds per-platform installers,
                  # signs the updater artifacts, generates latest.json, and uploads all
                  # of it. The tag that triggered the run names the release.
                  tagName: ${{ github.ref_name }}
                  releaseName: "Ebb ${{ github.ref_name }}"
                  releaseBody: "See the assets below to download and install. First run on an unsigned build needs a manual trust step — see docs/desktop/manual-trust.md."
                  releaseDraft: true
                  prerelease: false
                  includeUpdaterJson: true
                  args: ${{ matrix.args }}
